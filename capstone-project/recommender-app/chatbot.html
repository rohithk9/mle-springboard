<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beer Recommendation Chatbot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url('background.jpg'); /* Set the background image */
            background-size: cover;  /* Ensure the image covers the entire background */
            background-position: center; /* Center the image */
            background-repeat: no-repeat; /* Don't repeat the image */
            background-attachment: fixed; /* Ensure the background image stays fixed */
        }
        .chat-container {
            background-color: rgba(255, 255, 255, 0.9); /* Semi-transparent white */
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 400px;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }
        .chat-header {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.2em;
        }
        .chat-body {
            padding: 15px;
            flex-grow: 1;
            overflow-y: scroll;
            display: flex;
            flex-direction: column;
        }
        .chat-footer {
            padding: 10px;
            display: flex;
            border-top: 1px solid #ddd;
        }
        .chat-footer input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            flex-grow: 1;
        }
        .chat-footer button {
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            margin-left: 10px;
            cursor: pointer;
            border-radius: 4px;
        }
        .chat-message {
            margin-bottom: 10px;
            max-width: 70%;
            padding: 10px;
            border-radius: 10px;
            display: inline-block;
            white-space: pre-wrap; /* Keeps lines breaks formatted nicely for lists */
        }
        .bot-message {
            background-color: #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }
        .user-message {
            background-color: #4CAF50;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">Beer Recommendation Chatbot</div>
        <div class="chat-body" id="chat-body">
            <!-- Messages will be appended here -->
        </div>
        <div class="chat-footer">
            <input type="text" id="userInput" placeholder="Type your message here..." />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        let chatHistory = []; // Tracks the conversation state for the LLM

        // 1. Appends a message block to the chat container
        function appendMessage(message, isUser = false) {
            const chatBody = document.getElementById('chat-body');
            const messageElem = document.createElement('div');
            messageElem.className = 'chat-message';
            if (isUser) {
                messageElem.classList.add('user-message');
            } else {
                messageElem.classList.add('bot-message');
            }
            messageElem.innerText = message;
            chatBody.appendChild(messageElem);
            chatBody.scrollTop = chatBody.scrollHeight; // Auto-scrolls to the baseline
        }

        // 2. Removes the final child node (used to wipe "Thinking..." placeholders)
        function removeLastMessage() {
            const chatBody = document.getElementById('chat-body');
            if (chatBody.lastChild) {
                chatBody.removeChild(chatBody.lastChild);
            }
        }

        // 3. Captures the inputs and triggers the execution pipeline
        function sendMessage() {
            const inputElem = document.getElementById('userInput');
            const userMessage = inputElem.value.trim();

            if (!userMessage) return;

            // Add the text visually and flush the input field
            appendMessage(userMessage, true);
            inputElem.value = '';

            // Run the API call routine
            handleConversation(userMessage);
        }

        // 4. Coordinates backend requests and session updates
        function handleConversation(userMessage) {
            appendMessage("Thinking...");

            fetch('http://127.0.0.1:3000/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: userMessage,
                    history: chatHistory
                })
            })
            .then(response => response.json())
            .then(data => {
                removeLastMessage(); // Drop "Thinking..."
                appendMessage(data.response, false);
                chatHistory = data.history; // Persist rolling agent context window
            })
            .catch(error => {
                console.error('Error:', error);
                removeLastMessage();
                appendMessage('Sorry, something went wrong connecting to the agent.');
            });
        }

        // Bind 'Enter' key inside the input block for natural UX execution
        document.getElementById('userInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Initialize chat window with agent context
        window.onload = function() {
            appendMessage("Hi! I'm your AI Beer Sommelier. Tell me what flavors or styles you are looking for today!");
        };
    </script>
</body>
</html>
